name: deploy-ms3-aws

# MS3 (document service) deploys to AWS Lambda behind an API Gateway HTTP API.
# Storage: AWS S3 (private). Metadata/audit/hash-ledger: NeonDB PostgreSQL.
# Runs on push to main only after lint/typecheck/tests/build pass.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'migrations/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-ms3-aws.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-ms3-aws
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Run NeonDB migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # config validation needs S3 vars present even though migrate ignores them
          S3_ENDPOINT: https://s3.${{ secrets.AWS_REGION }}.amazonaws.com
          S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: node dist/database/migrate.js

      - name: Package Lambda bundle (production deps)
        run: |
          rm -rf deploy && mkdir deploy
          cp -r dist deploy/dist
          cp package.json package-lock.json deploy/
          (cd deploy && npm ci --omit=dev --no-audit --no-fund)
          (cd deploy && zip -qr ../function.zip .)
          ls -lh function.zip

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Lambda
        env:
          FN: ${{ secrets.LAMBDA_FUNCTION_NAME }}
          BUCKET: ${{ secrets.LAMBDA_ARTIFACT_BUCKET }}
        run: |
          aws s3 cp function.zip "s3://$BUCKET/lambda-deploy/ms3-function.zip"
          aws lambda update-function-code \
            --function-name "$FN" \
            --s3-bucket "$BUCKET" \
            --s3-key lambda-deploy/ms3-function.zip \
            --publish >/dev/null
          aws lambda wait function-updated --function-name "$FN"
          echo "MS3 Lambda updated."
