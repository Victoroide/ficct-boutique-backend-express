services:
  postgres:
    image: postgres:16-alpine
    container_name: ficct-docs-postgres
    environment:
      POSTGRES_USER: ficct
      POSTGRES_PASSWORD: ficct
      POSTGRES_DB: ficct_documents
    ports:
      - "5433:5432"
    volumes:
      - ficct_docs_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ficct -d ficct_documents"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: ficct-docs-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio-access
      MINIO_ROOT_PASSWORD: minio-secret-change-me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ficct_docs_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-bootstrap:
    image: minio/mc:RELEASE.2024-09-09T07-53-10Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minio-access minio-secret-change-me &&
        mc mb --ignore-existing local/ficct-documents &&
        mc anonymous set none local/ficct-documents
      "

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ficct-boutique-backend-express:dev
    container_name: ficct-docs-app
    depends_on:
      postgres:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://ficct:ficct@postgres:5432/ficct_documents
      S3_ENDPOINT: http://minio:9000
      JWT_PUBLIC_KEY_PATH: /app/.tools/keys/jwt_public_dev.pem
    ports:
      - "8081:8081"
    volumes:
      - ./.tools/keys:/app/.tools/keys:ro
    command: >
      sh -c "node dist/database/migrate.js && node dist/server.js"
    restart: unless-stopped

volumes:
  ficct_docs_pg_data:
    name: ficct_docs_pg_data
  ficct_docs_minio_data:
    name: ficct_docs_minio_data
